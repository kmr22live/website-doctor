document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n\n  <!-- ============ PROJECTS ============ -->\n  <sc-if value=\"{{ isProjects }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"min-height: 100vh; padding: 44px 24px; box-sizing: border-box; display: flex; justify-content: center; position: relative;\">\n      <div style=\"width: 100%; max-width: 1080px; display: flex; flex-direction: column; gap: 22px; animation: wdfade 0.4s ease;\">\n        <div data-wd-scanhead=\"1\" style=\"display: flex; align-items: center; gap: 16px;\">\n          <div style=\"width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #2DD4BF, #3B82F6); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 18px rgba(45,212,191,0.35);\">\n            <span class=\"material-icons\" style=\"color: #04110D; font-size: 24px;\">medical_services<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <h2 style=\"margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px;\">Projects<\u002Fh2>\n            <div style=\"font-size: 13px; color: rgba(231,236,244,0.5); margin-top: 2px;\">{{ sitesCount }} · open any report or run a new diagnosis<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ goNewScan }}\" style=\"border: none; background: linear-gradient(120deg, #2DD4BF, #3B82F6); color: #04110D; border-radius: 999px; padding: 12px 24px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 28px rgba(45,212,191,0.3); white-space: nowrap;\" style-hover=\"filter: brightness(1.12);\">\n            <span class=\"material-icons\" style=\"font-size: 18px;\">add<\u002Fspan>New scan\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div data-wd-pages=\"1\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;\">\n          <sc-for list=\"{{ projects }}\" as=\"pj\" hint-placeholder-count=\"2\">\n            <div sc-camel-on-click=\"{{ pj.onOpen }}\" style=\"background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px; padding: 20px; cursor: pointer; backdrop-filter: blur(8px); transition: border-color 0.2s ease, transform 0.2s ease; display: flex; flex-direction: column; gap: 14px;\" style-hover=\"border-color: rgba(94,234,212,0.35); transform: translateY(-3px);\">\n              <div style=\"display: flex; align-items: center; gap: 12px;\">\n                <div style=\"width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n                  <span class=\"material-icons-outlined\" style=\"font-size: 20px; color: rgba(231,236,244,0.6);\">{{ pj.icon }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"min-width: 0; flex: 1;\">\n                  <div style=\"font-weight: 700; font-size: 14px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ pj.domain }}<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: rgba(231,236,244,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ pj.name }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button sc-camel-on-click=\"{{ pj.onRescan }}\" title=\"Re-scan\" style=\"border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(231,236,244,0.6); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;\" style-hover=\"border-color: rgba(94,234,212,0.4); color: #5EEAD4;\"><span class=\"material-icons-outlined\" style=\"font-size: 16px;\">restart_alt<\u002Fspan><\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display: flex; align-items: center; gap: 14px;\">\n                <span style=\"font-family: 'Je 255,255,255,0.05); cursor: pointer; transition: background 0.15s ease;\" style-hover=\"background: rgba(255,255,255,0.03);\">\n                      <span style=\"display: inline-flex; align-items: center; background: {{ ti.sevBg }}; border: 1px solid {{ ti.sevBorder }}; color: {{ ti.sevText }}; border-radius: 999px; padding: 3px 11px; font-size: 11px; font-weight: 700; width: 62px; justify-content: center;\">{{ ti.sevLabel }}<\u002Fspan>\n                      <div style=\"flex: 1; min-width: 0;\">\n                        <div style=\"font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ ti.title }}<\u002Fdiv>\n                        <div style=\"font-size: 12px; color: rgba(231,236,244,0.5); margin-top: 2px;\">{{ ti.cat }} · {{ ti.page }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <span class=\"material-icons\" style=\"font-size: 18px; color: rgba(231,236,244,0.25);\">chevron_right<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display: flex; flex-direction: column; gap: 18px;\">\n                  <div style=\"background: linear-gradient(140deg, rgba(45,212,191,0.08), rgba(59,130,246,0.06) 50%, rgba(167,139,250,0.08)); border: 1px solid rgba(94,234,212,0.2); border-radius: 20px; padding: 20px 24px; backdrop-filter: blur(12px);\">\n                    <div style=\"display: flex; align-items: center; gap: 9px;\">\n                      <span class=\"material-icons\" style=\"font-size: 19px; color: #5EEAD4;\">auto_awesome<\u002Fspan>\n                      <span style=\"font-size: 16px; font-weight: 700; letter-spacing: -0.3px;\">AI summary<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"margin: 12px 0 0; font-size: 13px; line-height: 1.7; color: rgba(231,236,244,0.75); text-wrap: pretty;\">The site presents well visually, but three problems cost you bookings: the homepag overflow: ellipsis;\">{{ ir.title }}<\u002Fdiv>\n                      <div style=\"font-size: 12px; color: rgba(231,236,244,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;\">{{ ir.desc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span data-wd-hidecol=\"1\" style=\"font-size: 12px; color: rgba(231,236,244,0.55); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ ir.page }}<\u002Fspan>\n                    <span data-wd-hidecol=\"1\" style=\"font-size: 13px; color: rgba(231,236,244,0.55);\">{{ ir.cat }}<\u002Fspan>\n                    <span data-wd-hidecol2=\"1\" style=\"display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: {{ ir.statusColor }};\">\n                      <span class=\"material-icons\" style=\"font-size: 15px;\">{{ ir.statusIcon }}<\u002Fspan>{{ ir.status }}\n                    <\u002Fspan>\n                    <span class=\"material-icons\" style=\"font-size: 18px; color: rgba(231,236,244,0.25); justify-self: end;\">chevron_right<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ noIssues }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding: 44px; text-align: center; color: rgba(231,236,244,0.45); font-size: 14px;\">No issues match the current filters.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== PAGES ===== -->\n          <sc-if value=\"{{ secPages }}\" hint-placeholder-val=\"{{ false }}\">\n            <div data-screen-label=\"Pages\" style=\"display: flex; flex-direction: column; gap: 16px; max-width: 1320px; margin: 0 auto; animation: wdfade 0.35s ease;\">\n              <div style=\"display: flex; align-items: baseline; gap: 14px;\">\n                <h2 style=\"margin: 0; font-size: 24px; font-wei  style=\"margin: 9px 0 0; font-size: 13.5px; line-height: 1.7; color: rgba(231,236,244,0.8); text-wrap: pretty;\">{{ activeDesc }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2); border-radius: 14px; padding: 16px 18px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <span class=\"material-icons-outlined\" style=\"font-size: 17px; color: #FBBF24;\">trending_down<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #FCD34D;\">Business impact<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin: 9px 0 0; font-size: 13px; line-height: 1.65; color: rgba(252,211,77,0.85); text-wrap: pretty;\">{{ activeImpact }}<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <span class=\"material-icons\" style=\"font-size: 17px; color: #5EEAD4;\">auto_fix_high<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(231,236,244,0.4);\">Recommended fix<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin: 9px 0 0; font-size: 13.5px; line-height: 1.7; color: rgba(231,236,244,0.8); text-wrap: pretty;\">{{ activeFix }}<\u002Fp>\n            <sc-if value=\"{{ activeHasCode }}\" hint-placeholder-val=\"{{ false }}\">\n              <pre style=\"margin: 12px 0 0; background: rgba(2,4,9,0.8); border: 1px solid rgba(94,234,212,0.15); color: #99F6E4; border-radius: 12px; padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.75; overflow-x: auto; white-space: pre;\">{{ activeCode }}<\u002Fpre>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 18px; font-size: 12px; color: rgba(231,236,244,0.5);\">\n            <span style=\"display: inline-flex; align-items: center; gap: 6px;\"><span class=\"material-icons-outlined\" style=\"font-size: 16px;\">construction<\u002Fspan>Effort: {{ activeEffort }}<\u002Fspan>\n            <span style=\"display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace;\"><span class=\"material-icons-outlined\" style=\"font-size: 16px;\">rule<\u002Fspan>{{ activeRule }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 26px; border-top: 1px solid rgba(255,255,255,0.07); display: flex; gap: 10px;\">\n          <sc-if value=\"{{ activeHasCode }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ copyFix }}\" style=\"border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(231,236,244,0.8); border-radius: 999px; padding: 9px 18px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px;\" style-hover=\"border-color: rgba(94,234,212,0.4); color: #5EEAD4;\"><span class=\"material-icons-outlined\" style=\"font-size: 16px;\">content_copy<\u002Fspan>Copy fix<\u002Fbutton>\n          <\u002Fsc-if>\n          <div style=\"flex: 1;\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ toggleResolved }}\" style=\"border: none; background: {{ resolveBg }}; color: {{ resolveTextC }}; border-radius: 999px; padding: 10px 22px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; box-shadow: {{ resolveShadow }};\" style-hover=\"filter: brightness(1.1);\"><span class=\"material-icons\" style=\"font-size: 16px;\">{{ resolveIcon }}<\u002Fspan>{{ resolveLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- Toast -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: rgba(13,18,32,0.95); border: 1px solid rgba(94,234,212,0.3); color: #E7ECF4; border-radius: 999px; padding: 11px 24px; font-size: 13px; font-weight: 600; box-shadow: 0 16px 50px rgba(0,0,0,0.6); z-index: 60; animation: wdfade 0.2s ease; display: flex; align-items: center; gap: 9px;\">\n      <span class=\"material-icons\" style=\"font-size: 16px; color: #5EEAD4;\">check_circle<\u002Fspan>{{ toast }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startView&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;start&quot;, &quot;projects&quot;, &quot;analyzing&quot;, &quot;dashboard&quot;], &quot;default&quot;: &quot;start&quot;, &quot;tsType&quot;: &quot;'start' | 'projects' | 'analyzing' | 'dashboard'&quot;, &quot;section&quot;: &quot;Demo&quot;}, &quot;crawlSpeed&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.5, &quot;max&quot;: 4, &quot;step&quot;: 0.5, &quot;unit&quot;: &quot;x&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: null, url: '', scanUrl: 'grandmeridianhotel.com', stageIdx: -1, logs: [], section: 'overview', activeId: null, resolved: {}, filterQ: '', filterCat: 'All categories', filterSev: 'All severities', statusTab: 0, chat: [], chatInput: '', chatTyping: false, toast: null, checkCat: 0, checkQ: '', checkSev: 'All severities', checkStatus: 'All', activeSite: 'grandmeridianhotel.com', sites: [{ domain: 'grandmeridianhotel.com', name: 'The Grand Meridian Hotel', health: 68, pages: 8, issues: 23, critical: 4, scanned: '17 Jul 2026, 09:42' }] };\n\n  KNOWN_NAMES = { 'grandmeridianhotel.com': 'The Grand Meridian Hotel', 'thepalmresort.in': 'The Palm Resort' };\n\n  healthMeta(h) {\n    return h >= 75 ? { label: 'Good shape', color: '#34D399', glow: 'rgba(52,211,153,0.5)', bg: 'rgba(52,211,153,0.1)', border: 'rgba(52,211,153,0.3)', text: '#6EE7B7' }\n      : h >= 60 ? { label: 'Needs attention', color: '#FBBF24', glow: 'rgba(251,191,36,0.5)', bg: 'rgba(251,191,36,0.1)', border: 'rgba(251,191,36,0.3)', text: '#FCD34D' }\n      : { label: 'At risk', color: '#FB7185', glow: 'rgba(251,113,133,0.5)', bg: 'rgba(251,113,133,0.1)', border: 'rgba(251,113,133,0.3)', text: '#FDA4AF' };\n  }\n\n  SEV = {\n    critical: { label: 'Critical', main: '#FB7185', bg: 'rgba(251,113,133,0.1)', border: 'rgba(251,113,133,0.35)', text: '#FDA4AF' },\n    high: { label: 'High', main: '#FBBF24', bg: 'rgba(251,191,36,0.1)', border: 'rgba(251,191,36,0.35)', text: '#FCD34D' },\n    medium: { label: 'Medium', main: '#38BDF8', bg: 'rgba(56,189,248,0.1)', border: 'rgba(56,189,248,0.35)', text: '#7DD3FC' },\n    low: { label: 'Low', main: '#94A3B8', bg: 'rgba(148,163,184,0.1)', border: 'rgba(148,163,184,0.3)', text: '#CBD5E1' }\n  };\n\n  STAGES = [\n    { name: 'Crawl website', icon: 'travel_explore', detail: 'Opening pages, waiting for network idle', logs: ['GET / → 200 (1.8s)', 'GET /rooms → 200 (1.2s)'] },\n    { name: 'Discover pages', icon: 'account_tree', detail: 'Following internal links, deduplicating URLs', logs: ['found 8 internal pages', 'skipped 12 external links'] },\n    { name: 'Capture screenshots', icon: 'photo_camera', detail: 'Full-page captures at 1440px', logs: ['screenshot /gallery (2.4 MB)', 'screenshot /contact (0.9 MB)'] },\n    { name: 'Extract HTML & metadata', icon: 'code', detail: 'Titles, meta, headings, images, forms, schema', logs: ['parsed 8 documents with cheerio', 'extracted 214 images, 6 forms'] },\n    { name: 'Lighthouse audit', icon: 'speed', detail: 'Performance, SEO, best practices per page', logs: ['/ perf 52 · LCP 6.8s · CLS 0.02', '/gallery perf 41 · LCP 5.9s'] },\n    { name: 'Accessibility scan', icon: 'accessibility_new', detail: 'axe-core: ARIA, labels, contrast, keyboard', logs: ['24 img elements missing alt on /gallery', 'form inputs missing labels on /rooms'] },\n    { name: 'Security headers & TLS', icon: 'https', detail: 'CSP, HSTS, cookies, certificate, TLS version', logs: ['CSP + HSTS missing on all pages', 'TLS 1.3 · cert valid for 71 days'] },\n    { name: 'Code validation', icon: 'data_object', detail: 'W3C HTML/CSS, console errors, library CVEs', logs: ['W3C: 14 HTML errors on /rooms', 'console: 3 JS errors on /gallery · jQuery 2.2.4 CVE'] },\n    { name: 'Search Console sync', icon: 'query_stats', detail: 'Importing 90-day impressions and clicks', logs: ['imported 90d impressions for 8 pages', '2 clicked URLs redirect or 404'] },\n    { name: 'Rule engine', icon: 'rule', detail: 'Running 331 checks across 19 categories', logs: ['331 checks executed', '23 failed · 287 passed · 21 warnings'] },\n    { name: 'AI vision review', icon: 'visibility', detail: 'Senior-UX review of every screenshot', logs: ['vision: CTA contrast flagged on /', 'vision: inconsistent buttons across pages'] },\n    { name: 'AI HTML review', icon: 'psychology', detail: 'Frontend-QA review of markup and metadata', logs: ['html: duplicate titles on 3 pages', 'html: missing meta description on /'] },\n    { name: 'Cross-page consistency', icon: 'compare', detail: 'Header, footer, buttons, CTA wording', logs: ['4 primary button styles detected', 'footer link order differs on /contact'] },\n    { name: 'Generate fixes', icon: 'auto_fix_high', detail: 'Drafting code and copy for each issue', logs: ['generated 20 fixes (14 with code)', 'suggested meta description for /'] },\n    { name: 'Calculate scores', icon: 'calculate', detail: 'Weighing issues into category scores', logs: ['health 68 · SEO 72 · perf 58', 'report ready'] }\n  ];\n\n  ISSUES = [\n    { id: 'i1', sev: 'critical', cat: 'Performance', page: '/', title: 'Hero image is 4.2 MB and uncompressed', desc: 'The homepage hero (hero-lobby.jpg) ships as a 4.2 MB JPEG at 5760×3240 but renders at 1440×810. It is the LCP element and takes 6.8 s to paint on a 4G connection.', impact: 'Every extra second of load costs roughly 7% of conversions. At 6.8 s LCP, most mobile visitors see a blank hero for 5+ seconds — many bounce before the booking widget appears.', fix: 'Serve a responsive, modern-format image sized to the rendered dimensions and preload it.', code: '<link rel=\"preload\" as=\"image\" href=\"hero-lobby.avif\">\\n<img src=\"hero-lobby.avif\"\\n     srcset=\"hero-800.avif 800w, hero-1440.avif 1440w\"\\n     sizes=\"100vw\" width=\"1440\" height=\"810\"\\n     fetchpriority=\"high\" alt=\"Lobby of the Grand Meridian\">', effort: 'Low', rule: 'perf/oversized-images' },\n    { id: 'i2', sev: 'critical', cat: 'Accessibility', page: '/rooms', title: 'Booking form inputs have no labels', desc: 'The check-in date, check-out date and guests fields rely on placeholder text only. axe-core flags all three with \"form elements must have labels\" (critical).', impact: 'Screen-reader users cannot complete a booking — a direct revenue loss and an ADA/EAA compliance risk for hospitality sites.', fix: 'Associate a visible or visually-hidden label with each input.', code: '<label for=\"checkin\">Check-in date<\u002Flabel>\\n<input id=\"checkin\" type=\"date\" name=\"checkin\" required>\\n\\n<label for=\"guests\">Guests<\u002Flabel>\\n<select id=\"guests\" name=\"guests\">…<\u002Fselect>', effort: 'Low', rule: 'a11y/label' },\n    { id: 'i3', sev: 'critical', cat: 'SEO', page: '3 pages', title: 'Duplicate title tag on 3 pages', desc: '/rooms, /dining and /spa all use the identical title \"The Grand Meridian Hotel\". Search engines cannot tell the pages apart and may pick one to index.', impact: 'The rooms and dining pages are your highest-intent landing pages; duplicate titles suppress their rankings for \"suites\", \"restaurant\" and \"spa\" queries.', fix: 'Give each page a unique, descriptive title under 60 characters.', code: '<!-- /rooms -->\\n<title>Rooms & Suites | The Grand Meridian Hotel<\u002Ftitle>\\n<!-- /dining -->\\n<title>Fine Dining & Rooftop Bar | The Grand Meridian<\u002Ftitle>\\n<!-- /spa -->\\n<title>Spa & Wellness | The Grand Meridian Hotel<\u002Ftitle>', effort: 'Low', rule: 'seo/title-unique' },\n    { id: 'i22', sev: 'critical', cat: 'Security', page: 'Site-wide', title: 'jQuery 2.2.4 with known CVEs in production', desc: 'All pages load jQuery 2.2.4 (released 2016). It carries publicly known XSS vulnerabilities (CVE-2019-11358, CVE-2020-11022/11023) fixed in 3.5+. The booking widget depends on it.', impact: 'A known-vulnerable library on a site that handles booking and guest data is a real XSS attack surface and a PCI-DSS compliance red flag.', fix: 'Upgrade to jQuery 3.7 (drop-in for this usage) and add Subresource Integrity so the CDN copy cannot be tampered with.', code: '<scr' + 'ipt src=\"https://code.jquery.com/jquery-3.7.1.min.js\"\\n        integrity=\"sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=\"\\n        crossorigin=\"anonymous\"><\u002Fscr' + 'ipt>', effort: 'Low', rule: 'code/vulnerable-library' },\n    { id: 'i4', sev: 'high', cat: 'SEO', page: '/', title: 'Missing meta description on homepage', desc: 'The homepage has no meta description. Search engines generate an arbitrary snippet from page text — currently the cookie-banner copy.', impact: 'The search snippet is your ad copy on Google. A missing description measurably lowers click-through from search results.', fix: 'Add a compelling 150–160 character description.', code: '<meta name=\"description\" content=\"5-star boutique hotel in the\\nheart of the city. 94 rooms & suites, rooftop dining, full-service\\nspa. Best rate guaranteed when you book direct.\">', effort: 'Low', rule: 'seo/meta-description' },\n    { id: 'i5', sev: 'high', cat: 'Conversion', page: 'All pages', title: '\"Book now\" button fails contrast (2.9:1)', desc: 'The primary CTA renders gold (#C9A96A) text on white, a 2.9:1 ratio — below the 4.5:1 WCAG AA threshold. AI vision review also rated the button \"easy to miss\" on 6 of 8 screenshots.', impact: 'Your single most important button is hard to see for low-vision users and visually weak for everyone. This directly suppresses booking starts.', fix: 'Use a filled button with accessible contrast; keep gold as an accent.', code: '.btn-book {\\n  background: #8A6D3B;   /* 4.6:1 on white */\\n  color: #ffffff;\\n  border-radius: 4px;\\n  padding: 12px 28px;\\n}', effort: 'Low', rule: 'a11y/contrast + ai/vision' },\n    { id: 'i6', sev: 'high', cat: 'Accessibility', page: '/gallery', title: '24 images missing alt text', desc: 'All 24 gallery images have empty or missing alt attributes. They are meaningful content (rooms, restaurant, spa), not decoration.', impact: 'Screen-reader users get nothing from your most visual page, and Google Images cannot index the photos — a lost discovery channel for hotels.', fix: 'Add descriptive alt text to each image; AI has drafted all 24.', code: '<img src=\"suite-royal.jpg\"\\n     alt=\"Royal suite with king bed and skyline view\">\\n<img src=\"pool-night.jpg\"\\n     alt=\"Rooftop infinity pool lit at night\">', effort: 'Medium', rule: 'a11y/image-alt' },\n    { id: 'i7', sev: 'high', cat: 'Performance', page: 'All pages', title: 'Render-blocking CSS delays first paint', desc: 'Three stylesheets (312 KB total, including an unused carousel library) load synchronously in <head>, blocking first paint by ~1.9 s.', impact: 'Visitors stare at a white screen. First impressions of a 5-star hotel should not be a blank page.', fix: 'Inline critical CSS and defer the rest; drop the unused carousel styles.', code: '<link rel=\"preload\" href=\"main.css\" as=\"style\"\\n      onload=\"this.onload=null;this.rel=\\'stylesheet\\'\">\\n<noscript><link rel=\"stylesheet\" href=\"main.css\"><\u002Fnoscript>', effort: 'Medium', rule: 'perf/render-blocking' },\n    { id: 'i8', sev: 'high', cat: 'Navigation', page: '/events', title: '3 broken internal links', desc: '/events links to /weddings-2024, /meetings.html and /celebrate — all return 404. The pages were renamed in a redesign.', impact: 'Event planners hitting 404s mid-research are unlikely to submit an RFP. Broken links also waste crawl budget and erode search trust.', fix: 'Update the links or add 301 redirects from the old URLs.', code: '# .htaccess\\nRedirect 301 /weddings-2024 /weddings\\nRedirect 301 /meetings.html /meetings\\nRedirect 301 /celebrate /events', effort: 'Low', rule: 'nav/broken-links' },\n    { id: 'i9', sev: 'high', cat: 'SEO', page: 'Site-wide', title: 'No XML sitemap found', desc: 'Neither /sitemap.xml nor a Sitemap: entry in robots.txt exists. Deeper pages (/offers, /spa) rely on link discovery alone.', impact: 'New offers pages can take weeks to be indexed — promotions may expire before Google ever shows them.', fix: 'Generate a sitemap and reference it from robots.txt.', code: '# robots.txt\\nUser-agent: *\\nAllow: /\\nSitemap: https://grandmeridianhotel.com/sitemap.xml', effort: 'Low', rule: 'seo/sitemap' },\n    { id: 'i21', sev: 'high', cat: 'Security', page: 'Site-wide', title: 'CSP and HSTS security headers missing', desc: 'No Content-Security-Policy or Strict-Transport-Security header on any response. Cookies are also set without the Secure flag.', impact: 'Without CSP, any injected script runs unrestricted; without HSTS, first visits can be silently downgraded to HTTP. Both are table stakes for a site handling guest data.', fix: 'Add both headers at the web-server level; roll out CSP in report-only mode first.', code: '# nginx\\nadd_header Strict-Transport-Security\\n  \"max-age=31536000; includeSubDomains\" always;\\nadd_header Content-Security-Policy\\n  \"default-src \\'self\\'; img-src \\'self\\' data:;\\n   script-src \\'self\\' https://www.googletagmanager.com\" always;', effort: 'Medium', rule: 'security/headers' },\n    { id: 'i23', sev: 'high', cat: 'Code quality', page: '/gallery +1', title: 'JavaScript errors in console on 2 pages', desc: '/gallery throws 3 uncaught TypeErrors from the lightbox after lazy images load; /events logs an unhandled promise rejection from the RFP form validator.', impact: 'The gallery lightbox silently stops working after the first error — visitors cannot open full-size photos on your most visual page.', fix: 'Initialize the lightbox only after images resolve, and catch the validator promise.', code: \"document.addEventListener('DOMContentLoaded', () => {\\n  if (window.Lightbox) Lightbox.init({ lazy: true });\\n});\\nvalidateRfp(data).catch(err => showFormError(err));\", effort: 'Medium', rule: 'code/console-errors' },\n    { id: 'i10', sev: 'medium', cat: 'Content', page: '/spa', title: 'Placeholder \"lorem ipsum\" text in production', desc: 'The second treatment card on /spa still contains \"Lorem ipsum dolor sit amet…\" — leftover template copy.', impact: 'Placeholder text on a live 5-star hotel page reads as unfinished and undermines trust in the whole site.', fix: 'Replace with real treatment copy. AI drafted a starting point from your other spa descriptions.', code: null, effort: 'Low', rule: 'content/placeholder' },\n    { id: 'i11', sev: 'medium', cat: 'SEO', page: 'Site-wide', title: 'Open Graph tags missing', desc: 'No og:title, og:description or og:image on any page. Links shared on WhatsApp, Instagram or Facebook render as bare URLs.', impact: 'Hotel links are shared constantly in group chats while planning trips. A bare URL gets fewer taps than a rich card with your best photo.', fix: 'Add Open Graph and Twitter card tags to every page.', code: '<meta property=\"og:title\" content=\"The Grand Meridian Hotel\">\\n<meta property=\"og:description\" content=\"5-star boutique hotel…\">\\n<meta property=\"og:image\" content=\"https://…/og-hero.jpg\">\\n<meta name=\"twitter:card\" content=\"summary_large_image\">', effort: 'Low', rule: 'seo/open-graph' },\n    { id: 'i12', sev: 'medium', cat: 'UX', page: 'Cross-page', title: '4 different primary button styles', desc: 'Cross-page analysis found four visually distinct primary buttons: gold outline (home), solid navy (rooms), rounded green (offers) and underlined text (contact).', impact: 'Inconsistent CTAs make the site feel stitched together and force users to re-learn what is clickable on every page.', fix: 'Standardize on one primary and one secondary button style in a shared stylesheet.', code: null, effort: 'Medium', rule: 'ai/cross-page' },\n    { id: 'i13', sev: 'medium', cat: 'Performance', page: 'All pages', title: 'Web fonts load without preload', desc: 'Two font families (4 weights, 380 KB) load late in the waterfall, causing a visible flash of fallback text on every page.', impact: 'The typography flash cheapens the visual first impression and contributes ~300 ms to perceived load.', fix: 'Preload the two critical WOFF2 files and set font-display: swap.', code: '<link rel=\"preload\" href=\"/fonts/canela.woff2\"\\n      as=\"font\" type=\"font/woff2\" crossorigin>', effort: 'Low', rule: 'perf/font-loading' },\n    { id: 'i14', sev: 'medium', cat: 'Tracking', page: '3 pages', title: 'GA4 tag missing on 3 pages', desc: 'The GA4 snippet is absent from /offers, /gallery and /contact — likely pages built after the analytics setup.', impact: 'You cannot see which offers convert or attribute bookings that start on these pages. Marketing decisions are running on partial data.', fix: 'Move the GA4 snippet into the shared layout template instead of per-page includes.', code: null, effort: 'Low', rule: 'track/ga4-coverage' },\n    { id: 'i15', sev: 'medium', cat: 'Forms', page: '/contact', title: 'Required fields lack required attribute', desc: 'Name and email on the contact form are validated only server-side. Users discover errors after submitting and lose their message on reload.', impact: 'Every failed submission is a lead that may not retry. Inline validation is table stakes for enquiry forms.', fix: 'Add native validation attributes.', code: '<input type=\"email\" name=\"email\" required\\n       autocomplete=\"email\">\\n<input type=\"text\" name=\"name\" required\\n       autocomplete=\"name\">', effort: 'Low', rule: 'forms/required' },\n    { id: 'i16', sev: 'medium', cat: 'Performance', page: '/gallery', title: 'Below-fold images not lazy-loaded', desc: 'All 24 gallery images load eagerly on page open — 18 MB transferred before the user scrolls.', impact: 'Mobile visitors on hotel Wi-Fi or roaming data pay for 18 MB up front; many give up before the grid renders.', fix: 'Add native lazy loading to below-fold images.', code: '<img src=\"pool-night.jpg\" loading=\"lazy\"\\n     decoding=\"async\" width=\"640\" height=\"427\"\\n     alt=\"Rooftop infinity pool lit at night\">', effort: 'Low', rule: 'perf/lazy-loading' },\n    { id: 'i17', sev: 'low', cat: 'SEO', page: 'Site-wide', title: 'Favicon missing touch-icon sizes', desc: 'Only a 16px favicon.ico is declared. No apple-touch-icon or 192/512px icons for Android home-screen shortcuts.', impact: 'Bookmarks and shared links show a blurry or generic icon — a small but visible brand polish gap.', fix: 'Add the standard icon set.', code: '<link rel=\"apple-touch-icon\" sizes=\"180x180\"\\n      href=\"/apple-touch-icon.png\">\\n<link rel=\"icon\" type=\"image/png\" sizes=\"192x192\"\\n      href=\"/icon-192.png\">', effort: 'Low', rule: 'seo/favicon' },\n    { id: 'i18', sev: 'low', cat: 'Content', page: '/offers', title: 'Duplicate H2 headings', desc: 'Two different offer cards both use the H2 \"Special offer\". Headings should describe their content uniquely.', impact: 'Minor SEO and screen-reader navigation friction; users skimming by heading cannot tell the offers apart.', fix: 'Rename to the actual offer names, e.g. \"Stay 3, pay 2\" and \"Spa weekend package\".', code: null, effort: 'Low', rule: 'content/duplicate-headings' },\n    { id: 'i19', sev: 'low', cat: 'UX', page: '/contact', title: 'Footer link order differs from other pages', desc: 'The footer on /contact lists links in a different order
