# Render blueprint — deploys Website Doctor as a Docker web service.
# Free plan works for the demo (ephemeral disk: scans reset on redeploy).
services:
  - type: web
    name: website-doctor
    runtime: docker
    plan: free
    healthCheckPath: /api/sites
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: AI_API_KEY
        sync: false # paste your Groq key in the Render dashboard
      - key: AI_MODEL
        value: openai/gpt-oss-120b
      - key: AI_MODEL_FALLBACKS
        value: llama-3.3-70b-versatile,llama-3.1-8b-instant
      - key: AI_VISION_MODEL
        value: qwen/qwen3.6-27b
      - key: AI_CALL_GAP_MS
        value: "3000"
      - key: MAX_PAGES
        value: "5"
      # Each axe page is a full Chromium revisit — cap hard on 512MB.
      - key: AXE_MAX_PAGES
        value: "3"
      # Lighthouse runs a SECOND Chromium — too heavy for the free 512MB
      # instance. Off by default there; its checks show honest N/A. Bump the
      # instance (or set >0) to enable.
      - key: LIGHTHOUSE_MAX_PAGES
        value: "0"
      - key: AI_MAX_VISION_PAGES
        value: "1"
      # Seed ONE light site at boot — a 10-page SPA here OOMs the 512MB
      # instance into a crash loop (ephemeral disk = reseed on every wake).
      - key: SEED_URLS
        value: https://example.com
