# Render blueprint — deploys Website Doctor as a Docker web service.
# Free plan works for the demo (ephemeral disk: scans reset on redeploy).
services:
  - type: web
    name: website-doctor
    runtime: docker
    plan: free
    healthCheckPath: /api/sites
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: AI_API_KEY
        sync: false # paste your Groq key in the Render dashboard
      - key: AI_MODEL
        value: openai/gpt-oss-120b
      - key: AI_MODEL_FALLBACKS
        value: llama-3.3-70b-versatile,llama-3.1-8b-instant
      - key: AI_VISION_MODEL
        value: qwen/qwen3.6-27b
      - key: AI_MAX_VISION_PAGES
        value: "2"
      - key: AI_CALL_GAP_MS
        value: "3000"
      - key: MAX_PAGES
        value: "10"
      - key: LIGHTHOUSE_MAX_PAGES
        value: "3"
      - key: SEED_URLS
        value: https://example.com,https://namastedev.com
